name: CI
permissions:
  contents: read

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.22', '1.23']

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y netcat-openbsd mysql-client

      - name: Wait for MySQL
        run: |
          echo "Waiting for MySQL to be ready..."
          while ! mysqladmin ping -h"127.0.0.1" -uroot -proot --silent; do
            sleep 1
          done
          echo "MySQL is ready!"

      - name: Configure MySQL
        run: |
          # ตั้งค่าเฉพาะที่จำเป็นและไม่น่าจะกระทบ Test
          mysql -h 127.0.0.1 -uroot -proot -e "UPDATE performance_schema.setup_instruments SET ENABLED='YES', TIMED='YES' WHERE NAME='wait/lock/metadata/sql/mdl';"
          mysql -h 127.0.0.1 -uroot -proot -e "UPDATE performance_schema.setup_consumers SET ENABLED='YES' WHERE NAME='global_instrumentation';"
          # บรรทัดนี้คือจุดที่อาจจะทำให้ Test พัง หาก Test มีการตรวจสอบ Lock หรือ Events 
          # ถ้ายังพังอยู่ ให้ลองใส่เครื่องหมาย # หน้าบรรทัดล่างสุดนี้เพื่อปิดการใช้งานดูครับ
          mysql -h 127.0.0.1 -uroot -proot -e "UPDATE performance_schema.setup_consumers SET ENABLED='YES' WHERE NAME='events_waits_current';"

      - name: Build
        run: script/cibuild

      - name: Upload gh-ost binary artifact
        if: matrix.go-version == '1.23'
        uses: actions/upload-artifact@v4
        with:
          name: gh-ost
          path: bin/gh-ost
